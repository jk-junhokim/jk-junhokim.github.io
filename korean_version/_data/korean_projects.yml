- layout: left
  name: CNN 기반 MNIST 데이터 분류
  link: https://github.com/jk-junhokim/deep_learning_cnn
  quote: >

  description: | # this will include new lines to allow paragraphs
    * 스탠포드 대학교 CS231n 수업을 기반으로 진행한 개인 프로젝트
    * MNIST 이미지를 분류를 위한 CNN을 구축하여 98.89%의 정확도에 도달
